server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true              # Auto-discover services from Eureka
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**

        - id: vendor-service
          uri: lb://VENDOR-SERVICE
          predicates:
            - Path=/api/vendors/**

        - id: device-service
          uri: lb://DEVICE-SERVICE
          predicates:
            - Path=/api/devices/**

        - id: device-assignment-service
          uri: lb://DEVICE-SERVICE
          predicates:
            - Path=/api/assignments/**

        - id: device-instance-service
          uri: lb://DEVICE-SERVICE
          predicates:
            - Path=/api/device_instance/**

        - id: company-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/companies/**

        - id: employee-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/employees/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

        - id: repair-service
          uri: lb://REPAIR-SERVICE
          predicates:
            - Path=/api/repairs/**

        - id: user-service-openapi
          uri: lb://USER-SERVICE
          predicates:
            - Path=/v3/api-docs/users
          filters:
            - RewritePath=/v3/api-docs/users,/v3/api-docs

        - id: vendor-service-openapi
          uri: lb://VENDOR-SERVICE
          predicates:
            - Path=/v3/api-docs/vendors
          filters:
            - RewritePath=/v3/api-docs/vendors,/v3/api-docs

        - id: device-service-openapi
          uri: lb://DEVICE-SERVICE
          predicates:
            - Path=/v3/api-docs/devices
          filters:
            - RewritePath=/v3/api-docs/devices,/v3/api-docs

        - id: notification-service-openapi
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/v3/api-docs/notifications
          filters:
            - RewritePath=/v3/api-docs/notifications,/v3/api-docs

        - id: repair-service-openapi
          uri: lb://REPAIR-SERVICE
          predicates:
            - Path=/v3/api-docs/repairs
          filters:
            - RewritePath=/v3/api-docs/repairs,/v3/api-docs

        - id: customer-service-openapi
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/v3/api-docs/customer
          filters:
            - RewritePath=/v3/api-docs/customer,/v3/api-docs

        - id: audit-service
          uri: lb://AUDIT-SERVICE
          predicates:
            - Path=/api/audit/**

        - id: audit-service-openapi
          uri: lb://AUDIT-SERVICE
          predicates:
            - Path=/v3/api-docs/audit
          filters:
            - RewritePath=/v3/api-docs/audit,/v3/api-docs
      # Global CORS config
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# JWT secret
jwt:
  secret: drmsSuperSecretKeyForJwtTokenGenerationMustBe32CharsLong

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: User Service
        url: /v3/api-docs/users
      - name: Vendor Service
        url: /v3/api-docs/vendors
      - name: Device Service
        url: /v3/api-docs/devices
      - name: Notification Service
        url: /v3/api-docs/notifications
      - name: Repair Service
        url: /v3/api-docs/repairs
      - name: Customer Service
        url: /v3/api-docs/customer
      - name: Audit Service
        url: /v3/api-docs/audit

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.example.api_gateway: DEBUG
