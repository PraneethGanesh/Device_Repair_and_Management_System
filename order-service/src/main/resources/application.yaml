spring:
  application:
    name: order-service


  datasource:
    url: jdbc:mysql://localhost:3306/device_db
    username: ${USER_NAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
server:
  port: 8087

rabbitmq:
  exchange:
    name: notification.exchange
  routing:
    key:
      company: notification.company.#
