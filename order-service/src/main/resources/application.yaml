spring:
  application:
    name: order-service


  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/device_db?createDatabaseIfNotExist=true}
    username: ${USER_NAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
server:
  port: 8087

rabbitmq:
  exchange:
    name: notification.exchange
  routing:
    key:
      company: notification.company.#
