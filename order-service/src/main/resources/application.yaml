spring:
  application:
    name: order-service


  datasource:
    url: jdbc:mysql://mysql:3306/device_db?createDatabaseIfNotExist=true
    username: ${USER_NAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
server:
  port: 8087

rabbitmq:
  exchange:
    name: notification.exchange
  routing:
    key:
      company: notification.company.#
