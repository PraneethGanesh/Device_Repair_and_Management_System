spring:
  application:
    name: vendor-service

  datasource:
    url: jdbc:mysql://localhost:3306/device_db
    username: ${USER_NAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


server:
  port: 8082

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
     defaultZone: http://localhost:8761/eureka

jwt:
  secret: drmsSuperSecretKeyForJwtTokenGenerationMustBe32CharsLong
  expiration: 86400000
