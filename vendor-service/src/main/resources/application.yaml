spring:
  application:
    name: vendor-service

  datasource:
    url: jdbc:mysql://mysql:3306/device_db?createDatabaseIfNotExist=true
    username: ${USER_NAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka

jwt:
  secret: drmsSuperSecretKeyForJwtTokenGenerationMustBe32CharsLong
  expiration: 86400000

rabbitmq:
  exchange:
    name: notification.exchange
  routing:
    key:
      admin: notification.broadcast
