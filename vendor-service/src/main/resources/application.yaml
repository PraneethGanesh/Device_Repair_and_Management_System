spring:
  application:
    name: vendor-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/device_db?createDatabaseIfNotExist=true}
    username: ${USER_NAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

jwt:
  secret: drmsSuperSecretKeyForJwtTokenGenerationMustBe32CharsLong
  expiration: 86400000

rabbitmq:
  exchange:
    name: notification.exchange
  routing:
    key:
      admin: notification.broadcast
