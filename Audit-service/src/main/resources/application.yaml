spring:
  application:
    name: Audit-service

  datasource:
    url: jdbc:mysql://localhost:3306/audit_service_db
    username: root
    password: your_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: audit-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.repair_service.dto,com.example.audit_service.dto"
        spring.json.use.type.headers: false       # deserialize into local DTO, not the producer's class
        spring.json.value.default.type: com.example.audit_service.dto.RepairEventDTO
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
kafka:
  topic:
    repair-events: repair-events
server:
  port: 8086