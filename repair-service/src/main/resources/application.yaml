spring:
  application:
    name: repair-service

  datasource:
    url: jdbc:mysql://localhost:3306/repairdb?createDatabaseIfNotExist=true
    username: ${USER_NAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8084

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification_exchange
  repair:
    raised:
      routing:
        key: repair_raised_key
    acknowledged:
      routing:
        key: repair_acknowledged_key
    completed:
      routing:
        key: repair_completed_key
    closed:
      routing:
        key: repair_closed_key

feign:
  circuitbreaker:
    enabled: true
