spring:
  application:
    name: repair-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/repairdb?createDatabaseIfNotExist=true}
    username: ${USER_NAME}
    password: ${PASSWORD:drms_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      retries: 3

kafka:
  topic:
    repair-events: repair-events
server:
  port: 8084

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification.exchange
  repair:
    raised:
      routing:
        key: notification.company.repair-raised
    acknowledged:
      routing:
        key: notification.broadcast
    completed:
      routing:
        key: notification.company.repair-completed
    closed:
      routing:
        key: notification.employee.repair-closed
feign:
  circuitbreaker:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: true
